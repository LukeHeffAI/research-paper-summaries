# DownLow configuration (F2).
#
# This file holds the typed *application* configuration that is not a secret:
# the steering profiles (which replace the legacy data/research_data.json +
# data/document_data.json) and the per-stage model/summary config.
#
# Secrets and infra (ANTHROPIC_API_KEY, DATA_DIR, DATABASE_URL, ...) stay in the
# environment / .env and are read by Settings -- never here. `core` is handed the
# typed values from here; it never reads this file.
#
# The DB-backed ResearchProfile / OutputProfile tables are a later phase; for now
# profiles live here and are loaded into pure pydantic domain models.

[profile]
# Which named profiles steer summarisation by default.
active_research = "luke"
active_output = "literature_review"

[summary]
# Per-stage model config for SUMMARISE. `model` is a bare model-id string (no
# date suffix). `effort` is a real cost lever -- summarisation runs cheap.
# `max_tokens` is the non-streaming default; structured summaries are small.
model = "claude-sonnet-4-6"
max_tokens = 8000
effort = "low"
prompt_version = "summary-v1"


# --- Research profiles (the reader's research identity) ---------------------- #
# Seeded from legacy/data/research_data.json.

[research.luke]
research_field = "Machine Learning"
research_topic = "generalisation of large pretrained models"
research_interests = [
    "Multimodal models",
    "Zero-shot classification",
    "Human-AI collaboration",
    "Model interpretability",
]
research_focus = "developing models that can generalise to new tasks and domains, and understanding how to make these models more interpretable and usable for humans"

[research.mehrnia]
research_field = "Machine Learning"
research_topic = "improving machine learning models for out-of-distribution generalisation"
research_interests = [
    "Large language models",
    "Vision-language models",
    "Predictive reasoning",
    "Hallucination detection in generative models",
    "Diffusion",
]
research_focus = "developing models that can generalise to domains outside of the domain they were trained on, and understanding how to make these models more robust to distributional shifts"

[research.harriet]
research_field = "Anthropology"
research_topic = "Indigenous studies in Australia"
research_interests = [
    "Learning on-country principles",
    "Meaning of 'Country' in indigenous contexts",
    "Settler colonial theory",
    "Land education/pedagogy and curriculum development",
]
research_focus = "land based education and building education programs that incorporate indigenous knowledges and pedagogies"


# --- Output profiles (what the summary should surface) ----------------------- #
# Seeded from legacy/data/document_data.json.

[output.literature_review]
document_type = "Literature Review"
return_details = [
    "A summary of the overall document, of roughly 300 words",
    "Key findings",
    "Contributions to the field",
    "Gaps remaining",
]
