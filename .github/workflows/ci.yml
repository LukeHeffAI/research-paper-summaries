name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHONPATH: src

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - run: uv sync --frozen --extra dev
      - name: Ruff check
        run: uv run ruff check src/ tests/
      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - run: uv sync --frozen --extra dev
      - name: Mypy
        run: uv run mypy src/downlow/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - run: uv sync --frozen --extra dev
      - name: Run tests with coverage
        run: uv run pytest --cov=downlow --cov-report=term-missing
      # Phase 1: when the integration render/audio tests land, install the `typst`
      # binary (typst-community/setup-typst) and `ffmpeg` (apt) here — unit tests
      # need neither. Phase 9: add a Docker build + Trivy `scan` job.
