name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHONPATH: src

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - run: uv sync --frozen --extra dev
      - name: Ruff check
        run: uv run ruff check src/ tests/
      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - run: uv sync --frozen --extra dev
      - name: Mypy
        run: uv run mypy src/downlow/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - run: uv sync --frozen --extra dev
      - name: Install ffmpeg (NARRATE audio integration tests)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install typst (RENDER report integration tests)
        uses: typst-community/setup-typst@v4
        with:
          typst-version: "0.13.1"
      - name: Run tests with coverage
        run: uv run pytest --cov=downlow --cov-report=term-missing
      # Phase 9: add a Docker build + Trivy `scan` job. The audio `integration/`
      # tests need ffmpeg (installed above); the RENDER `integration/` tests need
      # the pinned `typst` binary (installed above).
