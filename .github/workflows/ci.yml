name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHONPATH: src

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - run: uv sync --frozen --extra dev
      - name: Ruff check
        run: uv run ruff check src/ tests/
      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - run: uv sync --frozen --extra dev
      - name: Mypy
        run: uv run mypy src/downlow/

  # 2.2a -- schema-drift gate: the baseline migration must build the schema and the
  # SQLModel models must agree with the committed migrations (autogenerate finds no
  # diff). A drift between code and migrations fails CI here. Targets a throwaway
  # SQLite DB via DATABASE_URL so it never touches a real data dir.
  migrations:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:///./ci-drift-check.db
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - run: uv sync --frozen --extra dev
      - name: Upgrade head builds the schema
        run: uv run alembic upgrade head
      - name: Models and migrations agree (no drift)
        run: uv run alembic check
      - name: Downgrade base is clean
        run: uv run alembic downgrade base

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - run: uv sync --frozen --extra dev
      - name: Install ffmpeg (NARRATE audio integration tests)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install typst (RENDER report integration tests)
        uses: typst-community/setup-typst@v4
        with:
          typst-version: "0.13.1"
      - name: Run tests with coverage
        run: uv run pytest --cov=downlow --cov-report=term-missing
      # Phase 9: add a Docker build + Trivy `scan` job. The audio `integration/`
      # tests need ffmpeg (installed above); the RENDER `integration/` tests need
      # the pinned `typst` binary (installed above).

  # 2.4a -- Postgres proof: the SAME core + schema + migrations run unchanged on
  # Postgres. A `postgres` service container backs DATABASE_URL; the job (a) runs
  # the migration chain (upgrade head -> check (no drift) -> downgrade base) on
  # Postgres, then (b) runs the DATABASE_URL-driven DB + integration tests against
  # it. The SQLite `test` job above still runs every test on SQLite; this job
  # proves portability without a local Postgres (it is CI-only). psycopg3 comes
  # from the `postgres` extra. No ffmpeg/typst here: the selected tests use the
  # FakeReportRenderer / FakeAudioMixer (no real binaries). DOWNLOW_REQUIRE_POSTGRES
  # makes the suite ABORT if DATABASE_URL is ever not Postgres (no hollow proof).
  test-postgres:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql+psycopg://downlow:downlow@localhost:5432/downlow_test
      DOWNLOW_REQUIRE_POSTGRES: "1"
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: downlow
          POSTGRES_PASSWORD: downlow
          POSTGRES_DB: downlow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U downlow -d downlow_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - run: uv sync --frozen --extra dev --extra postgres
      - name: Upgrade head builds the schema on Postgres
        run: uv run alembic upgrade head
      - name: Models and migrations agree on Postgres (no drift)
        run: uv run alembic check
      - name: Downgrade base is clean on Postgres
        run: uv run alembic downgrade base
      - name: Run the DATABASE_URL-driven DB + integration tests on Postgres
        run: >-
          uv run pytest
          tests/unit/test_repository.py
          tests/unit/test_migrations.py
          tests/integration/test_processing_real.py
