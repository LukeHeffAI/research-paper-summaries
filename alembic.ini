# Alembic config for DownLow.
#
# The database URL is NOT set here -- it is read from Settings (DATABASE_URL,
# defaulting to a SQLite file under DATA_DIR) in migrations/env.py, so the same
# migrations target SQLite now and Postgres later by flipping one env var. Keeping
# the URL out of this committed file also avoids baking a local path into the repo.

[alembic]
script_location = migrations
prepend_sys_path = src
# Split prepend_sys_path with os.pathsep (silences the legacy-splitting warning).
path_separator = os
# Timestamped, slugged revision filenames so the version history reads in order.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s
timezone = UTC

[post_write_hooks]
# Format generated migrations with ruff so they pass the lint/format CI jobs.
hooks = ruff_format
ruff_format.type = exec
ruff_format.executable = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
